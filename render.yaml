services:
  - type: web
    name: music-genre-svm
    env: docker
    repo: https://github.com/aziz0220/Music-Genre-Classification
    dockerfilePath: ./SVM_service/Dockerfile
    dockerContext: .
    healthCheckPath: /
    plan: free

  - type: web
    name: music-genre-vgg
    env: python
    repo: https://github.com/aziz0220/Music-Genre-Classification
    rootDir: VGG19_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:8000 --timeout 300 --workers 1
    envVars:
      - key: KAGGLE_API_TOKEN
        sync: false
    healthCheckPath: /
    plan: free
